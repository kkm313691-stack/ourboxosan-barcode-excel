<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>OURBOX 바코드 생성기</title>

<style>
body {
    font-family: "Malgun Gothic";
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container {
    background:white;
    padding:40px;
    border-radius:12px;
    width:600px;
    text-align:center;
}

input {
    width:100%;
    padding:10px;
    margin-top:5px;
    font-size:18px;
}

button {
    padding:14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
    color:white;
}

.normal { background:#2c7be5; }
.lot { background:#28a745; }
.create { background:#ff9800; width:100%; margin-top:20px; }

.btn-group {
    display:flex;
    gap:10px;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>OURBOX 바코드 생성기</h2>

<label>품명</label>
<input id="name">

<label>소비기한</label>
<input id="exp">

<div id="lotFields" style="display:none;">
<label>제조일자</label>
<input id="mfg">

<label>로트번호</label>
<input id="lot">
</div>

<label>수량</label>
<input id="qty">

<label>바코드 수량</label>
<input id="barcode_qty" type="number" value="1">

<div class="btn-group">
    <button class="normal" onclick="selectMode('normal')">일반 바코드</button>
    <button class="lot" onclick="selectMode('lot')">로트 바코드</button>
</div>

<button class="create" onclick="createExcel()">엑셀 생성</button>

</div>

<script>
const BASE_URL = "https://ourboxosan-barcode-excel.onrender.com";

let mode = "normal";

function selectMode(m){
    mode = m;

    document.getElementById("lotFields").style.display =
        m === "lot" ? "block" : "none";

    alert(m === "lot" ? "로트 모드 선택됨" : "일반 모드 선택됨");
}

async function createExcel(){

    const url = mode === "lot"
        ? "/create_excel_lot"
        : "/create_excel_normal";

    const res = await fetch(BASE_URL + url,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            name: document.getElementById("name").value,
            exp: document.getElementById("exp").value,
            mfg: document.getElementById("mfg")?.value || "",
            lot: document.getElementById("lot")?.value || "",
            qty: document.getElementById("qty").value,
            barcode_qty: document.getElementById("barcode_qty").value
        })
    });

    const blob = await res.blob();
    const urlObj = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = urlObj;
    a.download = "barcode.xlsx";
    a.click();
}
</script>

</body>
</html>
