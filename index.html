<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Ourbox 오산센터 바코드 생성기</title>

<style>
body {
    font-family: "Malgun Gothic";
    background: #f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:white;
    padding:40px;
    width:520px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1 { text-align:center; margin:0; }
h2 { text-align:center; margin-bottom:20px; color:#666; }

input, select {
    width:100%;
    padding:14px;
    margin:6px 0;
    font-size:18px;
    border-radius:8px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:16px;
    font-size:20px;
    background:#2c7be5;
    color:white;
    border:none;
    border-radius:10px;
    margin-top:15px;
    cursor:pointer;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="box">
<h1>Ourbox 오산센터</h1>
<h2>바코드 생성기</h2>

<select id="mode">
    <option value="normal">일반 바코드</option>
    <option value="lot">로트 바코드</option>
</select>

<input id="name" placeholder="품명">
<input id="exp" placeholder="소비기한">

<div id="lotFields" class="hidden">
    <input id="mfg" placeholder="제조일자">
    <input id="lot" placeholder="로트번호">
</div>

<input id="qty" placeholder="수량">
<input id="barcode_qty" type="number" value="1" min="1">

<button type="button" id="createBtn">엑셀 생성</button>
</div>

<script>

// 🔥 반드시 본인 Render 주소로 변경
const API_URL = "https://ourboxosan-barcode-excel.onrender.com/create_excel";

// 요소
const modeEl = document.getElementById("mode");
const nameEl = document.getElementById("name");
const expEl = document.getElementById("exp");
const mfgEl = document.getElementById("mfg");
const lotEl = document.getElementById("lot");
const qtyEl = document.getElementById("qty");
const barcodeQtyEl = document.getElementById("barcode_qty");
const lotFields = document.getElementById("lotFields");
const btn = document.getElementById("createBtn");

// UI
function toggleMode(){
    if(modeEl.value === "lot"){
        lotFields.classList.remove("hidden");
    }else{
        lotFields.classList.add("hidden");
    }
}

modeEl.addEventListener("change", toggleMode);

// 실행
btn.addEventListener("click", async () => {

    if(!barcodeQtyEl.value || barcodeQtyEl.value < 1){
        alert("바코드 수량은 1 이상 입력해주세요");
        return;
    }

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                mode: modeEl.value,
                name: nameEl.value,
                exp: expEl.value,
                mfg: mfgEl.value,
                qty: qtyEl.value,
                lot: lotEl.value,
                barcode_qty: barcodeQtyEl.value
            })
        });

        if (!res.ok) {
            alert("엑셀 생성 실패 (서버 오류)");
            return;
        }

        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "barcode.xlsx";
        document.body.appendChild(a);
        a.click();
        a.remove();

    } catch (err) {
        alert("서버 연결 실패");
        console.error(err);
    }
});

toggleMode();

</script>

</body>
</html>
