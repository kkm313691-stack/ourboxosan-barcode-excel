<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>바코드 생성기</title>

<style>
body { font-family: Arial; text-align:center; margin-top:50px; }
input, select { width:300px; padding:10px; margin:5px; }
button { padding:12px 20px; font-size:18px; }
</style>
</head>

<body>

<h2>바코드 엑셀 생성</h2>

<select id="mode">
    <option value="normal">일반 바코드</option>
    <option value="lot">로트 바코드</option>
</select>

<br>

<input id="name" placeholder="품명"><br>
<input id="exp" placeholder="소비기한"><br>
<input id="mfg" placeholder="제조일자"><br>
<input id="qty" placeholder="수량"><br>
<input id="lot" placeholder="로트번호"><br>
<input id="barcode_qty" type="number" value="1"><br>

<button onclick="createExcel()">생성</button>

<script>
async function createExcel() {
    const res = await fetch("/create_excel", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            mode: document.getElementById("mode").value,
            name: document.getElementById("name").value,
            exp: document.getElementById("exp").value,
            mfg: document.getElementById("mfg").value,
            qty: document.getElementById("qty").value,
            lot: document.getElementById("lot").value,
            barcode_qty: document.getElementById("barcode_qty").value
        })
    });

    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "barcode.xlsx";
    a.click();
}
</script>

</body>
</html>
