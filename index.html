<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>OURBOX 오산센터 - 바코드 생성기</title>
</head>

<body>

<h1>OURBOX 오산센터</h1>

<input id="name" placeholder="품명"><br>
<input id="exp" placeholder="소비기한"><br>
<input id="mfg" placeholder="제조일자"><br>
<input id="lot" placeholder="로트번호"><br>
<input id="qty" placeholder="수량"><br>
<input id="barcode_qty" value="1"><br>

<button onclick="normal()">일반</button>
<button onclick="lot()">로트</button>

<script>
const BASE = "https://ourboxosan-barcode-excel.onrender.com";

async function normal(){
    send("/create_excel_normal");
}

async function lot(){
    send("/create_excel_lot");
}

async function send(url){
    const res = await fetch(BASE+url,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            name: name.value,
            exp: exp.value,
            mfg: mfg.value,
            lot: lot.value,
            qty: qty.value,
            barcode_qty: barcode_qty.value
        })
    });

    const blob = await res.blob();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "barcode.xlsx";
    a.click();
}
</script>

</body>
</html>
